<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your OTP Code</title>
  <style>
    body { margin:0; padding:0; background:#f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; }
    .wrapper { max-width:560px; margin:40px auto; background:#fff; border-radius:12px;
               box-shadow:0 4px 24px rgba(0,0,0,.08); overflow:hidden; }
    .header  { background:#0f172a; padding:32px 40px; }
    .header h1 { margin:0; color:#fff; font-size:22px; letter-spacing:-.3px; }
    .header span { color:#3b82f6; }
    .body    { padding:40px; }
    .body p  { color:#374151; font-size:15px; line-height:1.6; margin:0 0 16px; }
    .otp-box { background:#eff6ff; border:2px dashed #3b82f6; border-radius:10px;
               text-align:center; padding:24px; margin:28px 0; }
    .otp-box .code { font-size:40px; font-weight:800; letter-spacing:10px; color:#1d4ed8;
                     font-family:'Courier New', monospace; }
    .otp-box .hint { font-size:13px; color:#6b7280; margin-top:8px; }
    .footer  { background:#f8fafc; padding:20px 40px; border-top:1px solid #e2e8f0;
               font-size:12px; color:#9ca3af; text-align:center; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>Fleet<span>OS</span></h1>
  </div>
  <div class="body">
    <p>Hi <strong th:text="${fullName}">User</strong>,</p>
    <p>Use the one-time code below to proceed. This code expires in
       <strong th:text="${expiryMinutes}">10</strong> minutes.</p>

    <div class="otp-box">
      <div class="code" th:text="${otp}">000000</div>
      <div class="hint">Do not share this code with anyone.</div>
    </div>

    <p>If you did not request this, you can safely ignore this email.</p>
    <p>— The <span th:text="${appName}">FleetOS</span> Team</p>
  </div>
  <div class="footer">
    &copy; 2025 FleetOS. This is an automated message — please do not reply.
  </div>
</div>
</body>
</html>
